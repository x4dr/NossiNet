{% extends "base/layout.html" %}
{% block head %}
    <meta name="htmx-config" content='{"useTemplateFragments":"true"}'>
    <link rel="stylesheet" type="text/css" href="{{ url_for("static", filename='chat.css') }}?v={{ restart_id }}">
    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
    <script src="{{ url_for("static", filename='js/sse.js') }}?v={{ restart_id }}"></script>
    <script src="{{ url_for("static", filename='chat.js') }}?v={{ restart_id }}"></script>
{% endblock %}
{% block body %}
    <div id="wrapper" hx-ext="sse" sse-connect="/sse_updates">
        <div style="display:none;">
            <div sse-swap="chat" hx-target="#chatbox" hx-swap="beforeend"></div>
            <div sse-swap="roll" hx-target="#chatbox" hx-swap="beforeend"></div>
        </div>
        {% if livekit_available %}
            <div id="livekit-start" style="display: flex; gap: 10px; margin-bottom: 10px;">
                <input type="text" id="room-code-input" class="dark" placeholder="Room Code (leave empty for random)"
                       style="flex-grow: 1; padding: 10px;">
                <button id="join-video-btn" class="dark" style="padding: 10px; cursor: pointer; white-space: nowrap;">
                    Join
                    Video Call
                </button>
            </div>
        {% else %}
            <div style="margin-bottom: 2px; padding: 0; color: var(--tertiary-color); text-align: center; font-style: italic; font-size: 0.5em;">
                Call functions unavailable
            </div>
        {% endif %}
        <div id="livekit-wrapper">
            <div id="room-info"
                 style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding: 10px; background: var(--midground-color); border-radius: 8px;">
                <div><strong>Room:</strong> <span id="current-room-name"></span></div>
                <div><strong>Participants:</strong> <span id="participant-count">0</span></div>
            </div>
            <div id="participant-list"
                 style="margin-bottom: 10px; display: flex; gap: 10px; flex-wrap: wrap; padding: 10px; background: var(--midground-color); border-radius: 8px; font-size: 14px;"></div>
            <div id="livekit-container"></div>
            <div class="controls">
                <button id="toggle-mic-btn" class="dark">Mute Mic</button>
                <button id="toggle-cam-btn" class="dark">Start Camera</button>
                <button id="leave-video-btn" class="dark">Leave Call</button>
            </div>
        </div>
        <div id="inner" style="width: 100%;">
            <div id="chatbox" class="chatbox" hx-get="/chat/history" hx-trigger="load" sse-swap="chat" hx-swap="beforeend"></div>
        </div>
        <div id="statusmessage" style="display: none;"></div>
        <form id="messageform" hx-post="/chat/send" hx-swap="none" hx-on::after-request="this.reset()">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="formline" style="display: flex; align-items: center">
                <label for="message_data"></label>
                <input class="dark" type="text" name="message_data" id="message_data"
                       placeholder="Message" autocomplete="off" style="flex-grow: 1">
                <input class="dark" name="submitmsg" type="submit" id="submitmsg"
                       value="Send"/>
            </div>
        </form>
    </div>

{% endblock %}
