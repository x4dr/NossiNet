{%- for linenr, message in messages.items() -%}
<div>[<time class="timestamp" datetime="{{- message.time -}}" tabindex="0" aria-describedby="full-date-{{- linenr -}}">{{- message.time -}}</time><span id="full-date-{{- linenr -}}" role="tooltip" class="hidden-until-hover">{{- message.time -}}</span>] {{ message.line -}}</div>
{%- endfor -%}
<div id="statusmessage" hx-swap-oob="true" style="display: block; opacity: 1;">Connected! Last Update: [<time class="timestamp" datetime="{{- now -}}" tabindex="0" aria-describedby="full-date-now">{{- now -}}</time><span id="full-date-now" role="tooltip" class="hidden-until-hover">{{- now -}}</span>]</div>
